<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Eurovision State</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 420px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 0.95rem;
      color: #888;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    .btn-scores {
      background: #dc2626;
      color: #fff;
    }

    .btn-identity {
      background: #334155;
      color: #f0f0f0;
    }

    .btn-all {
      background: #7f1d1d;
      color: #fca5a5;
      border: 1px solid #dc2626;
    }

    .btn-back {
      background: transparent;
      color: #888;
      border: 1px solid #333;
      margin-top: 0.5rem;
    }

    .status {
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #6366f1;
      min-height: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reset Eurovision State</h1>
    <p>Choose what to clear from this browser's local storage.</p>
    <div class="btn-group">
      <button class="btn-scores" onclick="resetScores()">Clear all scores</button>
      <button class="btn-identity" onclick="resetIdentity()">Clear username &amp; room</button>
      <button class="btn-all" onclick="resetAll()">Clear everything</button>
      <button class="btn-back" onclick="location.href='eurovision.html'">← Back to scoring</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <script>
    const STORAGE_KEY = 'eurovision2026_v2';

    function showStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function resetScores() {
      localStorage.removeItem(STORAGE_KEY);
      showStatus('Scores cleared.');
    }

    function resetIdentity() {
      localStorage.removeItem('esc_username');
      localStorage.removeItem('esc_room');
      showStatus('Username and room cleared.');
    }

    function resetAll() {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem('esc_username');
      localStorage.removeItem('esc_room');
      showStatus('Everything cleared.');
    }
  </script>
</body>
</html>
