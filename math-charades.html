<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiskunde Uitbeelden – Vrijgezellen Klaas 🎓</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Confetti particles */
    .confetti-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      opacity: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* Header */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(16, 16, 40, 0.9);
      backdrop-filter: blur(8px);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      border-bottom: 2px solid #f39c12;
    }

    .header-title {
      font-size: 1rem;
      color: #f39c12;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .counter {
      font-size: 1.4rem;
      font-weight: bold;
      color: #fff;
      background: #f39c12;
      padding: 4px 14px;
      border-radius: 20px;
    }

    /* Main card */
    .card-wrapper {
      position: relative;
      z-index: 5;
      width: 90%;
      max-width: 760px;
      margin-top: 70px;
    }

    .card {
      background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
      border: 2px solid #f39c12;
      border-radius: 24px;
      padding: 52px 48px 44px;
      text-align: center;
      box-shadow: 0 0 60px rgba(243,156,18,0.25), 0 20px 60px rgba(0,0,0,0.5);
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    .card.animate-out {
      transform: translateX(-80px);
      opacity: 0;
    }

    .card.animate-in {
      transform: translateX(80px);
      opacity: 0;
    }

    .theorem-number {
      font-size: 0.85rem;
      color: #f39c12;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .theorem-title {
      font-size: 2.2rem;
      font-weight: bold;
      color: #fff;
      margin-bottom: 18px;
      line-height: 1.2;
    }

    .theorem-formula {
      font-size: 1.6rem;
      color: #f39c12;
      margin: 18px 0;
      font-style: italic;
      letter-spacing: 1px;
    }

    .theorem-hint {
      font-size: 1.05rem;
      color: #aac4e8;
      line-height: 1.7;
      margin-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 18px;
    }

    .hint-label {
      font-size: 0.75rem;
      color: #f39c12;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 6px;
    }

    /* Navigation */
    .nav {
      display: flex;
      gap: 20px;
      margin-top: 32px;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 5;
    }

    .btn {
      background: transparent;
      border: 2px solid #f39c12;
      color: #f39c12;
      font-size: 1rem;
      padding: 12px 32px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      letter-spacing: 1px;
    }

    .btn:hover:not(:disabled) {
      background: #f39c12;
      color: #1a1a2e;
      transform: scale(1.05);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-next {
      background: #f39c12;
      color: #1a1a2e;
      font-weight: bold;
    }

    .btn-next:hover:not(:disabled) {
      background: #e67e22;
      border-color: #e67e22;
    }

    /* Progress bar */
    .progress-bar {
      width: 90%;
      max-width: 760px;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      margin-top: 24px;
      position: relative;
      z-index: 5;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f39c12, #e74c3c);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* Finished screen */
    .finished {
      display: none;
      text-align: center;
      position: relative;
      z-index: 5;
    }

    .finished.active { display: block; }
    .card-wrapper.hidden { display: none; }

    .finished h2 {
      font-size: 3rem;
      color: #f39c12;
      margin-bottom: 16px;
    }

    .finished p {
      font-size: 1.2rem;
      color: #aac4e8;
      margin-bottom: 28px;
    }

    .btn-restart {
      background: #f39c12;
      border: 2px solid #f39c12;
      color: #1a1a2e;
      font-size: 1.1rem;
      padding: 14px 40px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .btn-restart:hover {
      background: #e67e22;
      border-color: #e67e22;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="confetti-container" id="confetti"></div>

  <header class="header">
    <span class="header-title">🎓 Wiskunde Uitbeelden – Vrijgezellen Klaas</span>
    <span class="counter" id="counter">1 / 20</span>
  </header>

  <div class="card-wrapper" id="cardWrapper">
    <div class="card" id="card">
      <div class="theorem-number" id="theoremNumber">Stelling 1</div>
      <div class="theorem-title" id="theoremTitle"></div>
      <div class="theorem-formula" id="theoremFormula"></div>
      <div class="theorem-hint">
        <span class="hint-label">💡 Uitbeeldingstip</span>
        <span id="theoremHint"></span>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="btn" id="btnPrev" onclick="navigate(-1)" disabled>← Vorige</button>
    <button class="btn btn-next" id="btnNext" onclick="navigate(1)">Volgende →</button>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 5%"></div>
  </div>

  <div class="finished" id="finished">
    <h2>🎉 Klaar!</h2>
    <p>Klaas heeft alle 20 stellingen doorstaan.<br>Nu mag hij trouwen. 💍</p>
    <button class="btn-restart" onclick="restart()">↩ Opnieuw beginnen</button>
  </div>

  <script>
    const theorems = [
      {
        title: "Stelling van Pythagoras",
        formula: "a² + b² = c²",
        hint: "Teken een rechthoekige driehoek in de lucht. Wijs naar de korte zijden en gooi ze 'samen' – ze worden de schuine zijde."
      },
      {
        title: "Euler's Identiteit",
        formula: "e^(iπ) + 1 = 0",
        hint: "Vijf vingers omhoog (vijf constanten), laat één voor één zakken tot niets overblijft. Dit is 'de mooiste formule ter wereld'."
      },
      {
        title: "Fermat's Laatste Stelling",
        formula: "aⁿ + bⁿ ≠ cⁿ  (n > 2)",
        hint: "Teken een driehoek, gooi een denkbeeldige bal omhoog (machten), schud dan heftig je hoofd: het past nooit."
      },
      {
        title: "Stelling van Bayes",
        formula: "P(A|B) = P(B|A)·P(A) / P(B)",
        hint: "Doe alsof je een arts bent die een testuitslag herinterpreteert op basis van nieuwe informatie – je verandert van mening."
      },
      {
        title: "Centrale Limietstelling",
        formula: "Som van n metingen → Normaalverdeling",
        hint: "Gooi een denkbeeldige munt tien keer op, tel de koppen, herhaal – teken uiteindelijk een klokvorming met je handen."
      },
      {
        title: "Vier-Kleurenstelling",
        formula: "χ(G) ≤ 4 voor vlakke grafen",
        hint: "Teken een landkaart in de lucht en kleur elk land met slechts vier vingers (als potloden) – buren nooit dezelfde kleur."
      },
      {
        title: "Hairy Ball Theorem",
        formula: "∄ continue, nulpuntvrij vectorveld op S²",
        hint: "Probeer je haren op een bol (hoofd) allemaal glad te kammen zonder een knobbel of kale plek – onmogelijk!"
      },
      {
        title: "Ham Sandwich Theorem",
        formula: "∃ vlak dat ham, kaas & brood bisecteert",
        hint: "Maak een boterham-sandwich in de lucht en sla er met één rechte handbeweging dwars doorheen: alles exact gehalveerd."
      },
      {
        title: "Banach-Tarski Paradox",
        formula: "1 bol → 2 identieke bollen",
        hint: "Hou één denkbeeldige bal vast, 'snijd' hem in stukjes met je handen, goochel er twee ballen uit – even groot als het origineel."
      },
      {
        title: "Stellingen van Gödel",
        formula: "Elk consistent systeem is onvolledig",
        hint: "Wijs op een denkbeeldig wiskundeblad, schud je hoofd (dit is niet bewijsbaar), en maak dan een explosie-gebaar: het systeem crasht."
      },
      {
        title: "Fundamentele Stelling van de Calculus",
        formula: "∫ₐᵇ f(x) dx = F(b) − F(a)",
        hint: "Teken een curve in de lucht, arceer het oppervlak eronder, en laat zien dat afleiden en integreren elkaars omgekeerde zijn."
      },
      {
        title: "Stelling van Euclid over Priemgetallen",
        formula: "Er zijn oneindig veel priemgetallen",
        hint: "Tel op je vingers 2, 3, 5, 7… raak je handen kwijt, start opnieuw – het einde is er nooit."
      },
      {
        title: "Wet van de Grote Aantallen",
        formula: "x̄ₙ → μ  als  n → ∞",
        hint: "Gooi een denkbeeldige dobbelsteen heel vaak op. Wijs telkens op het gemiddelde totdat je handen op één punt rusten: het echte gemiddelde."
      },
      {
        title: "Binomiumstelling van Newton",
        formula: "(a + b)ⁿ = Σ C(n,k) aᵏ bⁿ⁻ᵏ",
        hint: "Teken de driehoek van Pascal in de lucht, rij voor rij, waarbij je de termen optelt met je vingers."
      },
      {
        title: "Stelling van Cantor",
        formula: "|ℕ| < |ℝ|  —  verschillende groottes oneindig",
        hint: "Wijs op een eindeloze rij punten (de gehele getallen), maak dan een groter, overweldigend gebaar: de reële getallen zijn oneindig groter."
      },
      {
        title: "Tussenwaardestelling",
        formula: "f(a) < 0 < f(b) ⟹ ∃c: f(c) = 0",
        hint: "Beweeg je hand als een curve van onder de tafel omhoog: ze moet de tafel kruisen – er bestaat altijd een nulpunt."
      },
      {
        title: "Stelling van Nash (Evenwicht)",
        formula: "Elk spel heeft een Nash-evenwicht",
        hint: "Speel 'steen, papier, schaar' met een denkbeeldige tegenstander en bevriest – niemand wil als eerste van strategie wisselen."
      },
      {
        title: "Het Monty Hall Probleem",
        formula: "P(winst bij wisselen) = 2/3",
        hint: "Wijs op drie denkbeeldige deuren, kies één, laat dan een lege deur 'opengaan', en wissel nadrukkelijk van keuze met een triomfantelijk gebaar."
      },
      {
        title: "Stelling van Rolle",
        formula: "f(a) = f(b) ⟹ ∃c: f′(c) = 0",
        hint: "Teken een bult in de lucht die links en rechts op dezelfde hoogte eindigt – wijs op de top: de afgeleide is daar nul."
      },
      {
        title: "Grondslagenstelling van de Algebra",
        formula: "Elk polynoom van graad n heeft precies n wortels (in ℂ)",
        hint: "Teken een golvende curve (polynoom van graad 3), wijs driemaal op snijpunten met de x-as – precies zoveel als de graad."
      }
    ];

    let current = 0;
    let isAnimating = false;

    function render() {
      const t = theorems[current];
      document.getElementById('theoremNumber').textContent = `Stelling ${current + 1}`;
      document.getElementById('theoremTitle').textContent = t.title;
      document.getElementById('theoremFormula').textContent = t.formula;
      document.getElementById('theoremHint').textContent = t.hint;
      document.getElementById('counter').textContent = `${current + 1} / ${theorems.length}`;
      document.getElementById('progressFill').style.width = `${((current + 1) / theorems.length) * 100}%`;
      document.getElementById('btnPrev').disabled = current === 0;
      document.getElementById('btnNext').disabled = false;
      if (current === theorems.length - 1) {
        document.getElementById('btnNext').textContent = 'Klaar 🎉';
      } else {
        document.getElementById('btnNext').textContent = 'Volgende →';
      }
    }

    function navigate(dir) {
      if (isAnimating) return;

      if (dir === 1 && current === theorems.length - 1) {
        document.getElementById('cardWrapper').classList.add('hidden');
        document.querySelector('.nav').style.display = 'none';
        document.querySelector('.progress-bar').style.display = 'none';
        document.getElementById('finished').classList.add('active');
        return;
      }

      isAnimating = true;
      const card = document.getElementById('card');
      card.classList.add(dir === 1 ? 'animate-out' : 'animate-in');

      setTimeout(() => {
        current += dir;
        render();
        card.classList.remove('animate-out', 'animate-in');
        card.style.transform = dir === 1 ? 'translateX(80px)' : 'translateX(-80px)';
        card.style.opacity = '0';
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            card.style.transition = 'transform 0.35s ease, opacity 0.35s ease';
            card.style.transform = '';
            card.style.opacity = '';
            setTimeout(() => {
              card.style.transition = '';
              isAnimating = false;
            }, 360);
          });
        });
      }, 320);
    }

    function restart() {
      current = 0;
      render();
      document.getElementById('cardWrapper').classList.remove('hidden');
      document.querySelector('.nav').style.display = 'flex';
      document.querySelector('.progress-bar').style.display = 'block';
      document.getElementById('finished').classList.remove('active');
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') navigate(1);
      if (e.key === 'ArrowLeft') navigate(-1);
    });

    // Confetti
    function makeConfetti() {
      const container = document.getElementById('confetti');
      const colors = ['#f39c12', '#e74c3c', '#3498db', '#2ecc71', '#9b59b6', '#fff'];
      const shapes = ['■', '●', '▲', '★'];
      for (let i = 0; i < 40; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = '-20px';
        el.style.color = colors[Math.floor(Math.random() * colors.length)];
        el.style.fontSize = (8 + Math.random() * 14) + 'px';
        el.style.animationDuration = (5 + Math.random() * 10) + 's';
        el.style.animationDelay = (Math.random() * 8) + 's';
        container.appendChild(el);
      }
    }

    makeConfetti();
    render();
  </script>
</body>
</html>
