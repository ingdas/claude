<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wiskunde Uitbeelden – Vrijgezellen Klaas 🎓</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      touch-action: pan-y;
    }

    .confetti-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .confetti {
      position: absolute;
      opacity: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110dvh) rotate(720deg); opacity: 0; }
    }

    .counter {
      font-size: clamp(1rem, 4vw, 1.4rem);
      font-weight: bold;
      color: #fff;
      background: #f39c12;
      padding: 4px 14px;
      border-radius: 20px;
      white-space: nowrap;
      margin-bottom: 16px;
    }

    .card-wrapper {
      position: relative;
      z-index: 5;
      width: 92%;
      max-width: 720px;
      margin-top: 0;
    }

    .card {
      background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
      border: 2px solid #f39c12;
      border-radius: 24px;
      padding: clamp(32px, 8vw, 60px) clamp(24px, 7vw, 52px);
      text-align: center;
      box-shadow: 0 0 60px rgba(243,156,18,0.25), 0 20px 60px rgba(0,0,0,0.5);
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    .card.animate-out { transform: translateX(-80px); opacity: 0; }
    .card.animate-in  { transform: translateX(80px);  opacity: 0; }

    .theorem-number {
      font-size: clamp(0.7rem, 2.5vw, 0.85rem);
      color: #f39c12;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .theorem-title {
      font-size: clamp(1.5rem, 6vw, 2.4rem);
      font-weight: bold;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .theorem-formula {
      font-size: clamp(1.1rem, 4.5vw, 1.7rem);
      color: #f39c12;
      font-style: italic;
      letter-spacing: 1px;
      line-height: 1.4;
    }

    .nav {
      display: flex;
      gap: 16px;
      margin-top: 28px;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 5;
      width: 92%;
      max-width: 720px;
    }

    .btn {
      background: transparent;
      border: 2px solid #f39c12;
      color: #f39c12;
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      padding: 14px 28px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      letter-spacing: 1px;
      min-height: 52px;
      flex: 1;
      max-width: 200px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active:not(:disabled) {
      transform: scale(0.96);
    }

    @media (hover: hover) {
      .btn:hover:not(:disabled) {
        background: #f39c12;
        color: #1a1a2e;
        transform: scale(1.05);
      }
    }

    .btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .btn-next {
      background: #f39c12;
      color: #1a1a2e;
      font-weight: bold;
    }

    .btn-next:active:not(:disabled) {
      background: #e67e22;
      border-color: #e67e22;
    }

    @media (hover: hover) {
      .btn-next:hover:not(:disabled) {
        background: #e67e22;
        border-color: #e67e22;
      }
    }

    .progress-bar {
      width: 92%;
      max-width: 720px;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      margin-top: 20px;
      position: relative;
      z-index: 5;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f39c12, #e74c3c);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .finished {
      display: none;
      text-align: center;
      position: relative;
      z-index: 5;
      padding: 20px;
    }

    .finished.active { display: block; }
    .card-wrapper.hidden { display: none; }

    .finished h2 {
      font-size: clamp(2rem, 8vw, 3rem);
      color: #f39c12;
      margin-bottom: 16px;
    }

    .finished p {
      font-size: clamp(1rem, 3.5vw, 1.2rem);
      color: #aac4e8;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .btn-restart {
      background: #f39c12;
      border: 2px solid #f39c12;
      color: #1a1a2e;
      font-size: clamp(1rem, 3.5vw, 1.1rem);
      padding: 16px 40px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      font-family: inherit;
      transition: all 0.2s ease;
      min-height: 52px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-restart:active {
      background: #e67e22;
      border-color: #e67e22;
      transform: scale(0.96);
    }

    @media (hover: hover) {
      .btn-restart:hover {
        background: #e67e22;
        border-color: #e67e22;
        transform: scale(1.05);
      }
    }
  </style>
</head>
<body>

  <div class="confetti-container" id="confetti"></div>

  <span class="counter" id="counter">1 / 20</span>

  <div class="card-wrapper" id="cardWrapper">
    <div class="card" id="card">
      <div class="theorem-number" id="theoremNumber">Stelling 1</div>
      <div class="theorem-title" id="theoremTitle"></div>
      <div class="theorem-formula" id="theoremFormula"></div>
    </div>
  </div>

  <div class="nav">
    <button class="btn" id="btnPrev" onclick="navigate(-1)" disabled>← Vorige</button>
    <button class="btn btn-next" id="btnNext" onclick="navigate(1)">Volgende →</button>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="finished" id="finished">
    <h2>🎉 Klaar!</h2>
    <p>Klaas heeft alle 20 stellingen doorstaan. 🎓</p>
    <button class="btn-restart" onclick="restart()">↩ Opnieuw beginnen</button>
  </div>

  <script>
    const theorems = [
      { title: "Stelling van Pythagoras",              formula: "a² + b² = c²" },
      { title: "Identiteit van Euler",                 formula: "e^(iπ) + 1 = 0" },
      { title: "Grote stelling van Fermat",            formula: "aⁿ + bⁿ ≠ cⁿ  (n > 2)" },
      { title: "Stelling van Bayes",                   formula: "P(A|B) = P(B|A)·P(A) / P(B)" },
      { title: "Centrale limietstelling",              formula: "Som van n metingen → Normaalverdeling" },
      { title: "Vierkleurenstelling",                  formula: "χ(G) ≤ 4 voor vlakke grafen" },
      { title: "Behaarde-bolstelling",                 formula: "∄ continu nulpuntvrij vectorveld op S²" },
      { title: "Hamboterhamstelling",                  formula: "∃ vlak dat ham, kaas & brood bisecteert" },
      { title: "Paradox van Banach-Tarski",            formula: "1 bol → 2 identieke bollen" },
      { title: "Paradox van de kapper",                formula: "De kapper scheert wie zichzelf niet scheert — maar wie scheert de kapper?" },
      { title: "Hoofdstelling van de analyse",         formula: "∫ₐᵇ f(x) dx = F(b) − F(a)" },
      { title: "Stelling van Euclides",                formula: "Er zijn oneindig veel priemgetallen" },
      { title: "Wet van de grote aantallen",           formula: "x̄ₙ → μ  als  n → ∞" },
      { title: "Verjaardagsparadox",                   formula: "n = 23 ⟹ P(zelfde verjaardag) > 50%" },
      { title: "Stelling van Cantor",                  formula: "|ℕ| < |ℝ|" },
      { title: "Tussenwaardestelling",                 formula: "f(a) < 0 < f(b) ⟹ ∃c: f(c) = 0" },
      { title: "Stelling van Nash",                    formula: "Elk spel heeft een Nash-evenwicht" },
      { title: "Monty Hall-probleem",                  formula: "P(winst bij wisselen) = 2/3" },
      { title: "Hotel van Hilbert",                    formula: "∞ kamers vol, toch altijd plek voor meer" },
      { title: "Stelling van Rolle",                   formula: "f(a) = f(b) ⟹ ∃c: f′(c) = 0" },
    ];

    let current = 0;
    let isAnimating = false;

    function render() {
      const t = theorems[current];
      document.getElementById('theoremNumber').textContent = `Stelling ${current + 1}`;
      document.getElementById('theoremTitle').textContent = t.title;
      document.getElementById('theoremFormula').textContent = t.formula;
      document.getElementById('counter').textContent = `${current + 1} / ${theorems.length}`;
      document.getElementById('progressFill').style.width = `${((current + 1) / theorems.length) * 100}%`;
      document.getElementById('btnPrev').disabled = current === 0;
      document.getElementById('btnNext').textContent = current === theorems.length - 1 ? 'Klaar 🎉' : 'Volgende →';
    }

    function navigate(dir) {
      if (isAnimating) return;

      if (dir === 1 && current === theorems.length - 1) {
        document.getElementById('cardWrapper').classList.add('hidden');
        document.querySelector('.nav').style.display = 'none';
        document.querySelector('.progress-bar').style.display = 'none';
        document.getElementById('finished').classList.add('active');
        return;
      }

      isAnimating = true;
      const card = document.getElementById('card');
      card.classList.add(dir === 1 ? 'animate-out' : 'animate-in');

      setTimeout(() => {
        current += dir;
        render();
        card.classList.remove('animate-out', 'animate-in');
        card.style.transform = dir === 1 ? 'translateX(80px)' : 'translateX(-80px)';
        card.style.opacity = '0';
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            card.style.transition = 'transform 0.35s ease, opacity 0.35s ease';
            card.style.transform = '';
            card.style.opacity = '';
            setTimeout(() => { card.style.transition = ''; isAnimating = false; }, 360);
          });
        });
      }, 320);
    }

    function restart() {
      current = 0;
      render();
      document.getElementById('cardWrapper').classList.remove('hidden');
      document.querySelector('.nav').style.display = 'flex';
      document.querySelector('.progress-bar').style.display = 'block';
      document.getElementById('finished').classList.remove('active');
    }

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') navigate(1);
      if (e.key === 'ArrowLeft') navigate(-1);
    });

    // Touch swipe
    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
    document.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
    }, { passive: true });

    // Confetti
    (function() {
      const container = document.getElementById('confetti');
      const colors = ['#f39c12', '#e74c3c', '#3498db', '#2ecc71', '#9b59b6', '#fff'];
      const shapes = ['■', '●', '▲', '★'];
      for (let i = 0; i < 40; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.color = colors[Math.floor(Math.random() * colors.length)];
        el.style.fontSize = (8 + Math.random() * 14) + 'px';
        el.style.animationDuration = (5 + Math.random() * 10) + 's';
        el.style.animationDelay = (Math.random() * 8) + 's';
        container.appendChild(el);
      }
    })();

    render();
  </script>
</body>
</html>
